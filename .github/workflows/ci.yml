name: IoT Edge System CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # Checkout repository
      # -----------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------
      # Setup Python
      # -----------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # -----------------------
      # Install dependencies
      # -----------------------
      - name: Install dependencies
        run: |
          pip install flask flask-cors requests

      # -----------------------
      # Python syntax check
      # -----------------------
      - name: Python compile check
        run: |
          python -m py_compile python/api.py
          python -m py_compile python/db.py
          python -m py_compile python/edge_simulator.py

      # -----------------------
      # Import validation
      # -----------------------
      - name: Python import test
        run: |
          python -c "import sys; sys.path.append('python'); import api; import db"

      # -----------------------
      # Repo structure validation
      # -----------------------
      - name: Validate project structure
        run: |
          test -f README.md
          test -f python/api.py
          test -f python/db.py
          test -f python/edge_simulator.py
          test -f dashboard/index.html
          test -f arduino/esp8266_device.ino

      # -----------------------
      # HTML sanity check (safe version)
      # -----------------------
      - name: HTML sanity check
        run: |
          python -c "
file = open('dashboard/index.html', encoding='utf-8').read()

assert '<html' in file.lower(), 'Missing <html> tag'
assert '</html>' in file.lower(), 'Missing </html> tag'
assert '<script' in file.lower(), 'Missing script tag'

print('HTML structure OK')
"

      # -----------------------
      # Final success message
      # -----------------------
      - name: CI Success
        run: echo '✔ IoT Edge System CI Passed'