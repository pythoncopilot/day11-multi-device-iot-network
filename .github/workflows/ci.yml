name: IoT Edge System CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install flask flask-cors requests

      - name: Python compile check
        run: |
          python -m py_compile python/api.py
          python -m py_compile python/db.py
          python -m py_compile python/edge_simulator.py

      - name: Python import test
        run: |
          python -c "import sys; sys.path.append('python'); import api; import db"

      - name: Validate project structure
        run: |
          test -f README.md
          test -f python/api.py
          test -f python/db.py
          test -f python/edge_simulator.py
          test -f dashboard/index.html
          test -f arduino/esp8266_device.ino

      # -------------------------
      # SAFE HTML CHECK (NO PYTHON BLOCKS)
      # -------------------------
      - name: HTML sanity check
        run: |
          grep -q "<html" dashboard/index.html
          grep -q "</html>" dashboard/index.html
          grep -q "<script" dashboard/index.html
          echo "HTML structure OK"

      - name: CI Success
        run: echo "✔ IoT Edge System CI Passed"